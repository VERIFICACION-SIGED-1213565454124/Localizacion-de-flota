<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de unidades</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --asfalto:#14181f; --asfalto2:#1c2230; --linea:#f5a623;
    --texto:#eef1f6; --texto-tenue:#8b93a3; --ok:#3ecf8e; --alerta:#ef5b5b;
    --borde:#2a3140;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--asfalto);color:var(--texto);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .layout{display:flex; height:100dvh;}
  aside{
    width:300px; min-width:300px; background:var(--asfalto2);
    border-right:1px solid var(--borde); display:flex; flex-direction:column;
    overflow:hidden;
  }
  @media (max-width: 700px){
    .layout{ flex-direction:column; height:100dvh; }
    aside{
      width:100%; min-width:0; max-height:38dvh;
      border-right:none; border-bottom:1px solid var(--borde);
    }
    #mapa{ flex:1; min-height:0; }
  }
  header{
    padding:18px 18px 14px; border-bottom:1px solid var(--borde);
  }
  .eyebrow{font-family:"Courier New",monospace; font-size:11px; letter-spacing:.14em;
    color:var(--linea); text-transform:uppercase; margin-bottom:4px;}
  h1{font-size:18px; margin:0;}
  .resumen{font-size:12px; color:var(--texto-tenue); margin-top:6px;}
  #lista{ overflow-y:auto; flex:1; padding:8px; }
  .unidad{
    padding:12px 12px; margin-bottom:6px; border-radius:10px;
    background:#0f131a; border:1px solid var(--borde); cursor:pointer;
    transition:border-color .12s;
  }
  .unidad:hover{ border-color:var(--linea); }
  .fila-unidad{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .unidad .nombre{ font-weight:700; font-size:14px; }
  .unidad .hora{ font-size:11px; color:var(--texto-tenue); font-family:"Courier New",monospace; margin-top:2px;}
  .btn-eliminar{
    flex-shrink:0; background:transparent; border:1px solid var(--borde);
    color:var(--texto-tenue); border-radius:8px; padding:6px 9px;
    cursor:pointer; font-size:14px; transition:.12s;
  }
  .btn-eliminar:hover{ background:var(--alerta); border-color:var(--alerta); color:#fff; }
  .estado-punto{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
  .reciente{ background:var(--ok); }
  .viejo{ background:var(--alerta); }
  #mapa{ flex:1; }
  .vacio{ padding:20px; color:var(--texto-tenue); font-size:13px; text-align:center; }
  .leaflet-popup-content{ font-family:-apple-system,sans-serif; font-size:13px; }

  .leaflet-control-layers{
    background:var(--asfalto2) !important; border:1px solid var(--borde) !important;
    color:var(--texto) !important; border-radius:10px !important;
  }
  .leaflet-control-layers-toggle{ filter:invert(1); }
  .leaflet-control-layers label{ color:var(--texto) !important; font-size:13px; }

  .pulso-anillo{
    position:absolute; inset:0; border-radius:50%;
    border:2px solid; opacity:.7;
    animation:pulso 1.8s ease-out infinite;
  }
  @keyframes pulso{
    0%   { transform:scale(.7); opacity:.7; }
    100% { transform:scale(1.9); opacity:0; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside>
    <header>
      <div class="eyebrow">Flota en vivo</div>
      <h1>Ubicación de unidades</h1>
      <div class="resumen" id="resumen">Cargando...</div>
    </header>
    <div id="lista"><div class="vacio">Sin datos todavía.</div></div>
  </aside>
  <div id="mapa"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  // Pega aquí la misma URL de Apps Script que usaste en index.html
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzA5b4JbwrE3SWw9mMVjXPUhRb97X5sL9FgNOd886GUeuYCjDJ5IbHCpNIpF5haS4Sh/exec";
  const REFRESCO_MS = 20000; // cada 20 segundos

  const map = L.map('mapa').setView([23.6345, -102.5528], 5); // centro de México por default

  const capaCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
  });
  const capaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri', maxZoom: 19
  });
  const capaRelieve = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenTopoMap', maxZoom: 17
  });

  capaCalles.addTo(map);
  L.control.layers({
    'Calles': capaCalles,
    'Satélite': capaSatelite,
    'Relieve': capaRelieve
  }, {}, { position: 'topright' }).addTo(map);

  let marcadores = {};
  let yaCentroMapa = false;

  window.addEventListener('resize', () => map.invalidateSize());
  setTimeout(() => map.invalidateSize(), 300);

  function minutosDesde(iso){
    return Math.round((Date.now() - new Date(iso).getTime()) / 60000);
  }

  // Cambia este emoji si prefieres otro: 🚚 (camión), 🧑 (persona), 🚛, 🚐
  const EMOJI_UNIDAD = '🚚';

  function iconoUnidad(reciente){
    const color = reciente ? '#3ecf8e' : '#ef5b5b';
    return L.divIcon({
      className: '',
      html: `
        <div style="position:relative; width:34px; height:34px;">
          ${reciente ? `<div class="pulso-anillo" style="border-color:${color};"></div>` : ''}
          <div style="
            position:relative; width:34px; height:34px; border-radius:50%;
            background:#14181f; border:2px solid ${color};
            display:flex; align-items:center; justify-content:center;
            font-size:17px; box-shadow:0 2px 6px rgba(0,0,0,.4);">
            ${EMOJI_UNIDAD}
          </div>
        </div>`,
      iconSize: [34,34], iconAnchor:[17,17]
    });
  }

  async function eliminarUnidad(nombre, ev){
    ev.stopPropagation(); // que no dispare el clic de centrar mapa
    if(!confirm(`¿Eliminar "${nombre}" del panel?`)) return;
    try{
      await fetch(`${APPS_SCRIPT_URL}?accion=eliminar&nombre=${encodeURIComponent(nombre)}`);
      actualizar();
    }catch(e){
      alert('No se pudo eliminar. Revisa tu conexión.');
    }
  }

  const CLAVE_CACHE = 'ubicacionesFlota';

  function guardarCache(datos){
    try{ localStorage.setItem(CLAVE_CACHE, JSON.stringify(datos)); }catch(e){}
  }

  function leerCache(){
    try{
      const guardado = localStorage.getItem(CLAVE_CACHE);
      return guardado ? JSON.parse(guardado) : [];
    }catch(e){ return []; }
  }

  async function actualizar(){
    let datos;
    try{
      const r = await fetch(APPS_SCRIPT_URL);
      datos = await r.json();
      guardarCache(datos); // guarda la última versión buena que llegó
    }catch(e){
      datos = leerCache(); // sin conexión: usa lo último que se guardó
      if(!datos.length){
        document.getElementById('resumen').textContent = 'No se pudo conectar con la base.';
        return;
      }
      pintarDatos(datos);
      document.getElementById('resumen').textContent = 'Sin conexión — mostrando últimos datos guardados';
      return;
    }
    pintarDatos(datos);
  }

  function pintarDatos(datos){
    const lista = document.getElementById('lista');
    const resumen = document.getElementById('resumen');
    if(!datos.length){
      lista.innerHTML = '<div class="vacio">Sin datos todavía.</div>';
      resumen.textContent = '0 unidades reportando';
      return;
    }

    resumen.textContent = `${datos.length} unidad(es) reportando`;
    lista.innerHTML = '';

    const idsActuales = new Set();

    datos.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

    datos.forEach(u => {
      idsActuales.add(u.nombre);
      const mins = minutosDesde(u.timestamp);
      const reciente = mins <= 30;

      // Tarjeta lateral
      const div = document.createElement('div');
      div.className = 'unidad';
      div.innerHTML = `
        <div class="fila-unidad">
          <div>
            <div class="nombre"><span class="estado-punto ${reciente ? 'reciente':'viejo'}"></span>${u.nombre}</div>
            <div class="hora">hace ${mins} min · ${new Date(u.timestamp).toLocaleTimeString('es-MX')}</div>
          </div>
          <button class="btn-eliminar" title="Eliminar unidad">🗑</button>
        </div>
      `;
      div.onclick = () => map.setView([u.lat, u.lng], 14);
      div.querySelector('.btn-eliminar').onclick = (ev) => eliminarUnidad(u.nombre, ev);
      lista.appendChild(div);

      // Marcador en mapa
      if(marcadores[u.nombre]){
        marcadores[u.nombre].setLatLng([u.lat, u.lng]);
        marcadores[u.nombre].setIcon(iconoUnidad(reciente));
      } else {
        marcadores[u.nombre] = L.marker([u.lat, u.lng], { icon: iconoUnidad(reciente) }).addTo(map);
      }
      marcadores[u.nombre].bindPopup(`<b>${u.nombre}</b><br>hace ${mins} min<br>${u.lat.toFixed(5)}, ${u.lng.toFixed(5)}`);
    });

    // Quitar marcadores de unidades que ya no vienen en los datos
    Object.keys(marcadores).forEach(nombre => {
      if(!idsActuales.has(nombre)){
        map.removeLayer(marcadores[nombre]);
        delete marcadores[nombre];
      }
    });

    // La primera vez que hay datos reales, centra el mapa para que se vean todas las unidades
    if(!yaCentroMapa && datos.length){
      const grupo = L.featureGroup(Object.values(marcadores));
      map.fitBounds(grupo.getBounds().pad(0.3));
      yaCentroMapa = true;
    }
  }

  // Al abrir la página, muestra de inmediato lo último guardado (sin esperar la red)
  const cacheInicial = leerCache();
  if(cacheInicial.length){
    pintarDatos(cacheInicial);
    document.getElementById('resumen').textContent = 'Cargando datos actualizados...';
  }

  actualizar();
  setInterval(actualizar, REFRESCO_MS);
</script>
</body>
</html>
