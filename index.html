<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compartir ubicación</title>
<style>
  :root{
    --asfalto: #14181f;
    --asfalto2: #1c2230;
    --linea: #f5a623;
    --linea-suave: #f5a62333;
    --texto: #eef1f6;
    --texto-tenue: #8b93a3;
    --ok: #3ecf8e;
    --error: #ef5b5b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      repeating-linear-gradient(180deg, transparent 0 48px, var(--linea-suave) 48px 52px),
      var(--asfalto);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--texto);
  }
  .wrap{
    min-height:100dvh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    width:100%; max-width:420px;
    background:var(--asfalto2);
    border:1px solid #2a3140;
    border-radius:18px;
    padding:32px 24px;
    text-align:center;
  }
  .eyebrow{
    font-family:"Courier New",monospace;
    letter-spacing:.14em;
    font-size:12px;
    color:var(--linea);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-size:22px; margin:0 0 4px;
    font-weight:700;
  }
  .sub{
    color:var(--texto-tenue);
    font-size:14px;
    margin:0 0 26px;
  }
  input[type=text]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid #2a3140;
    background:#0f131a;
    color:var(--texto);
    font-size:15px;
    margin-bottom:14px;
  }
  input[type=text]::placeholder{ color:var(--texto-tenue); }
  button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:var(--linea);
    color:#1a1300;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  button:active{ transform:scale(.98); }
  button:disabled{ opacity:.55; cursor:default; }
  .estado{
    margin-top:20px;
    font-size:14px;
    min-height:20px;
    font-family:"Courier New",monospace;
  }
  .estado.ok{ color:var(--ok); }
  .estado.error{ color:var(--error); }
  .estado.espera{ color:var(--texto-tenue); }
  .coords{
    margin-top:10px;
    font-size:12px;
    color:var(--texto-tenue);
    font-family:"Courier New",monospace;
  }
  .pulso{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--linea); margin-right:6px;
    animation:parpadeo 1s infinite;
  }
  @keyframes parpadeo{ 0%,100%{opacity:1;} 50%{opacity:.2;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Unidad en ruta</div>
      <h1>Compartir mi ubicación</h1>
      <p class="sub">Toca el botón una sola vez. Se envía directo a la base — no necesitas hacer nada más.</p>

      <input type="text" id="nombre" placeholder="Tu nombre o número de unidad">
      <button id="btnEnviar">📍 Compartir ubicación</button>

      <div class="estado" id="estado"></div>
      <div class="coords" id="coords"></div>
    </div>
  </div>

<script>
  // 1) Pega aquí la URL de tu Google Apps Script una vez que la despliegues (ver README).
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVEQ2dyUSrTWjUTqPkgZt9RnWkpTWBBfWG0edOrgDov8-xfI8e9V8kvx6GmQ27SXr1/exec";

  const btn = document.getElementById('btnEnviar');
  const estado = document.getElementById('estado');
  const coordsEl = document.getElementById('coords');
  const nombreInput = document.getElementById('nombre');

  // Recuerda el nombre en este teléfono para la próxima vez
  const params = new URLSearchParams(location.search);
  const nombreUrl = params.get('nombre') || params.get('unidad');
  nombreInput.value = nombreUrl || localStorage.getItem('nombreEmpleado') || '';

  function setEstado(msg, tipo){
    estado.textContent = msg;
    estado.className = 'estado ' + (tipo || '');
  }

  btn.addEventListener('click', () => {
    const nombre = nombreInput.value.trim();
    if(!nombre){
      setEstado('Escribe tu nombre o número de unidad primero.', 'error');
      nombreInput.focus();
      return;
    }
    localStorage.setItem('nombreEmpleado', nombre);

    if(!navigator.geolocation){
      setEstado('Este teléfono no permite compartir ubicación desde el navegador.', 'error');
      return;
    }

    btn.disabled = true;
    setEstado('Obteniendo tu ubicación...', 'espera');

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude, accuracy } = pos.coords;
      coordsEl.textContent = `Lat ${latitude.toFixed(5)}, Lng ${longitude.toFixed(5)} · precisión ${Math.round(accuracy)}m`;
      setEstado('Enviando...', 'espera');

      try{
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // evita preflight en Apps Script
          body: JSON.stringify({
            nombre,
            lat: latitude,
            lng: longitude,
            precision: Math.round(accuracy),
            timestamp: new Date().toISOString()
          })
        });
        setEstado('✔ Ubicación enviada. Ya puedes cerrar esta página.', 'ok');
      }catch(err){
        setEstado('No se pudo enviar. Revisa tu conexión e inténtalo otra vez.', 'error');
      }finally{
        btn.disabled = false;
      }
    }, (err) => {
      btn.disabled = false;
      if(err.code === 1){
        setEstado('Debes dar permiso de ubicación para poder enviarla.', 'error');
      } else {
        setEstado('No se pudo obtener tu ubicación. Verifica que el GPS esté activado.', 'error');
      }
    }, { enableHighAccuracy: true, timeout: 15000 });
  });
</script>
</body>
</html>
