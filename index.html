<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compartir ubicación</title>
<style>
  :root{
    --asfalto: #14181f;
    --asfalto2: #1c2230;
    --linea: #f5a623;
    --linea-suave: #f5a62333;
    --texto: #eef1f6;
    --texto-tenue: #8b93a3;
    --ok: #3ecf8e;
    --error: #ef5b5b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      repeating-linear-gradient(180deg, transparent 0 48px, var(--linea-suave) 48px 52px),
      var(--asfalto);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--texto);
  }
  .wrap{
    min-height:100dvh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    width:100%; max-width:420px;
    background:var(--asfalto2);
    border:1px solid #2a3140;
    border-radius:18px;
    padding:32px 24px;
    text-align:center;
  }
  .eyebrow{
    font-family:"Courier New",monospace;
    letter-spacing:.14em;
    font-size:12px;
    color:var(--linea);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-size:22px; margin:0 0 4px;
    font-weight:700;
  }
  .sub{
    color:var(--texto-tenue);
    font-size:14px;
    margin:0 0 26px;
  }
  input[type=text]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid #2a3140;
    background:#0f131a;
    color:var(--texto);
    font-size:15px;
    margin-bottom:14px;
  }
  input[type=text]::placeholder{ color:var(--texto-tenue); }
  button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:var(--linea);
    color:#1a1300;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  button:active{ transform:scale(.98); }
  button:disabled{ opacity:.55; cursor:default; }
  .estado{
    margin-top:20px;
    font-size:14px;
    min-height:20px;
    font-family:"Courier New",monospace;
  }
  .estado.ok{ color:var(--ok); }
  .estado.error{ color:var(--error); }
  .estado.espera{ color:var(--texto-tenue); }
  .coords{
    margin-top:10px;
    font-size:12px;
    color:var(--texto-tenue);
    font-family:"Courier New",monospace;
  }
  .pulso{
    display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--linea); margin-right:6px;
    animation:parpadeo 1s infinite;
  }
  @keyframes parpadeo{ 0%,100%{opacity:1;} 50%{opacity:.2;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Unidad en ruta</div>
      <h1>Compartir mi ubicación</h1>
      <p class="sub">Toca el botón una vez para activar el envío automático — se sigue actualizando solo mientras dejes esta página abierta.</p>

      <input type="text" id="nombre" placeholder="Tu nombre o número de unidad">
      <button id="btnEnviar">📍 Activar envío automático</button>

      <div class="estado" id="estado"></div>
      <div class="coords" id="coords"></div>
    </div>
  </div>

<script>
  // 1) Pega aquí la URL de tu Google Apps Script una vez que la despliegues (ver README).
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzA5b4JbwrE3SWw9mMVjXPUhRb97X5sL9FgNOd886GUeuYCjDJ5IbHCpNIpF5haS4Sh/exec";
  const INTERVALO_MIN = 3; // cada cuántos minutos se reenvía sola

  const btn = document.getElementById('btnEnviar');
  const estado = document.getElementById('estado');
  const coordsEl = document.getElementById('coords');
  const nombreInput = document.getElementById('nombre');

  // Recuerda el nombre en este teléfono para la próxima vez
  const params = new URLSearchParams(location.search);
  const nombreUrl = params.get('nombre') || params.get('unidad');
  nombreInput.value = nombreUrl || localStorage.getItem('nombreEmpleado') || '';

  let intervaloActivo = null;

  function setEstado(msg, tipo){
    estado.textContent = msg;
    estado.className = 'estado ' + (tipo || '');
  }

  function enviarUbicacion(nombre){
    return new Promise((resolve) => {
      if(!navigator.geolocation){
        setEstado('Este teléfono no permite compartir ubicación desde el navegador.', 'error');
        return resolve(false);
      }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        coordsEl.textContent = `Última ubicación: ${latitude.toFixed(5)}, ${longitude.toFixed(5)} · precisión ${Math.round(accuracy)}m · ${new Date().toLocaleTimeString('es-MX')}`;
        try{
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' }, // evita preflight en Apps Script
            body: JSON.stringify({
              nombre,
              lat: latitude,
              lng: longitude,
              precision: Math.round(accuracy),
              timestamp: new Date().toISOString()
            })
          });
          resolve(true);
        }catch(err){
          resolve(false);
        }
      }, (err) => {
        resolve(false);
      }, { enableHighAccuracy: true, timeout: 15000 });
    });
  }

  function detenerEnvioAutomatico(){
    if(intervaloActivo) clearInterval(intervaloActivo);
    intervaloActivo = null;
    btn.textContent = '📍 Activar envío automático';
    btn.dataset.activo = '0';
    setEstado('Envío automático detenido.', '');
  }

  btn.addEventListener('click', async () => {
    // Si ya está activo, el botón sirve para detenerlo
    if(btn.dataset.activo === '1'){
      detenerEnvioAutomatico();
      return;
    }

    const nombre = nombreInput.value.trim();
    if(!nombre){
      setEstado('Escribe tu nombre o número de unidad primero.', 'error');
      nombreInput.focus();
      return;
    }
    localStorage.setItem('nombreEmpleado', nombre);

    btn.disabled = true;
    setEstado('Obteniendo tu ubicación...', 'espera');

    const ok = await enviarUbicacion(nombre);
    btn.disabled = false;

    if(!ok){
      setEstado('No se pudo obtener o enviar tu ubicación. Verifica el GPS y tu conexión, e inténtalo otra vez.', 'error');
      return;
    }

    // Ya se envió la primera vez: ahora se repite sola cada INTERVALO_MIN minutos
    btn.textContent = '⏹ Detener envío automático';
    btn.dataset.activo = '1';
    estado.innerHTML = `<span class="pulso"></span> Enviando automáticamente cada ${INTERVALO_MIN} min. No cierres esta página.`;
    estado.className = 'estado ok';

    intervaloActivo = setInterval(async () => {
      const ok2 = await enviarUbicacion(nombre);
      if(ok2){
        estado.innerHTML = `<span class="pulso"></span> Enviando automáticamente cada ${INTERVALO_MIN} min. No cierres esta página.`;
        estado.className = 'estado ok';
      }
    }, INTERVALO_MIN * 60 * 1000);
  });

  // Si el empleado cierra o cambia de pestaña, el navegador puede pausar el temporizador;
  // al volver a esta pestaña, se manda una ubicación fresca de inmediato.
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && btn.dataset.activo === '1'){
      const nombre = nombreInput.value.trim();
      if(nombre) enviarUbicacion(nombre);
    }
  });
</script>
</body>
</html>
